<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kontakt | SEFA</title>
<meta name="description" content="Kontaktiere das SEFA-Team" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#08281f;--green-2:#0f4a36;--sand:#c6a25e;--cream:#fbf6ea;--cream-2:#f3ead8;--ink:#0b1f18;--muted:#68756f;--line:rgba(8,40,31,.12);--card:#fffdf7}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 70% 8%,#f3ead8 0,#fbf6ea 26%,#fffaf0 62%,#f8f0df 100%)}a{color:var(--green-2);text-decoration:none}a:hover{text-decoration:underline}.container{width:min(760px,calc(100% - 48px));margin:0 auto}.top{padding:28px 0;border-bottom:1px solid var(--line);background:rgba(255,255,255,.28);backdrop-filter:blur(10px)}.nav{display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{font-family:"DM Serif Display",serif;font-size:30px;letter-spacing:.04em;color:var(--green);line-height:1}.back{font-size:14px;color:var(--green-2);font-weight:800;display:inline-flex;align-items:center;gap:8px}main{padding:48px 0 80px}h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:44px;line-height:1;color:var(--green);margin:0 0 10px;font-weight:700}.lead,.updated{color:var(--muted);font-size:15px;line-height:1.7;margin:0 0 34px}h2{font-family:"Cormorant Garamond",Georgia,serif;font-size:27px;line-height:1.15;color:var(--green);margin:38px 0 12px;font-weight:700}p{line-height:1.75;color:#283933;margin:0 0 14px;font-size:15.5px}ul{padding-left:20px;line-height:1.8;font-size:15.5px;margin:0 0 18px;color:#283933}li{margin-bottom:5px}.card{background:rgba(255,253,247,.72);border:1px solid var(--line);border-radius:18px;padding:28px;margin:28px 0 22px;box-shadow:0 18px 45px rgba(8,40,31,.06)}label{display:block;font-weight:800;font-size:13.5px;color:var(--green);margin-bottom:7px;margin-top:18px}input,textarea,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:15px;color:var(--ink)}textarea{min-height:96px;resize:vertical}select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%230f4a36'><path d='M5.5 7.5l4.5 4.5 4.5-4.5' stroke='%230f4a36' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}.btn{display:inline-block;margin-top:22px;padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,#073f2f,#062b22);color:#fff;font-weight:800;font-size:15px;border:none;cursor:pointer;box-shadow:0 14px 28px rgba(8,40,31,.16)}.btn:hover{background:var(--green-2);text-decoration:none}.btn:disabled{opacity:.6;cursor:default}.note{font-size:13.5px;color:var(--muted);margin-top:14px;min-height:18px}.section-line{border:none;border-top:1px solid var(--line);margin:30px 0}.footer{padding:32px 0;border-top:1px solid var(--line);color:var(--muted);font-size:13px}footer a{color:var(--green-2);font-weight:700;text-decoration:none}footer a:hover{text-decoration:underline}.footer strong{color:var(--green)}@media(max-width:620px){.container{width:min(100% - 30px,760px)}main{padding-top:36px}h1{font-size:36px}h2{font-size:24px}.nav{align-items:flex-start}.brand{font-size:27px}}
</style>
</head>
<body>
<header class="top"><div class="container nav"><a class="brand" href="index.html">SEFA</a><a class="back" href="index.html">← Zurück</a></div></header>
<main><div class="container">
<h1>Kontakt</h1><p class="lead">Hast du eine Frage, einen Vorschlag oder möchtest du dich für eine Mitgliedschaft interessieren? Wir freuen uns, von dir zu hören.</p>
<p><strong>Westinas</strong><br>Neugasse 6<br>8005 Zürich, Schweiz<br>E-Mail: <a href="mailto:info@sefa-app.ch">info@sefa-app.ch</a></p>
<div class="card"><form id="contactForm">
<label for="name">Dein Name</label><input type="text" id="name" placeholder="Vorname Nachname" required>
<label for="email">Deine E-Mail-Adresse</label><input type="email" id="email" placeholder="beispiel@email.com" required>
<label for="subject">Thema</label><select id="subject" required><option value="General">Allgemein</option><option value="Membership">Mitgliedschaft</option><option value="Suggestion">Vorschlag</option></select>
<label for="message">Nachricht</label><textarea id="message" required></textarea>
<button class="btn" type="submit">Nachricht senden</button>
<p class="note" id="formStatus" aria-live="polite"></p>
</form></div>
</div></main>
<footer class="footer"><div class="container">© 2026 SEFA<br>Kontakt: <a href="mailto:info@sefa-app.ch">info@sefa-app.ch</a><br><strong>Ein Produkt von <a href="https://www.westinas.ch" target="_blank" rel="noopener">Westinas</a>.</strong></div></footer>
<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var form = e.target;
  var btn = form.querySelector('button[type="submit"]');
  var status = document.getElementById('formStatus');
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var subject = document.getElementById('subject').value;
  var message = document.getElementById('message').value.trim();

  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Wird gesendet…';
  status.textContent = '';
  status.style.color = '';

  try {
    var res = await fetch('https://api.sefa-app.ch/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, subject: subject, message: message })
    });
    var json = await res.json();
    if (res.ok && json && json.data && json.data.sent) {
      status.style.color = 'var(--green-2)';
      status.textContent = 'Danke! Deine Nachricht wurde gesendet.';
      form.reset();
      btn.textContent = originalText;
    } else {
      throw new Error((json && json.error && json.error.message) || 'Unknown error');
    }
  } catch (err) {
    status.style.color = '#b3261e';
    status.textContent = 'Etwas ist schiefgelaufen. Bitte versuche es erneut oder schreibe uns direkt an info@sefa-app.ch.';
    btn.textContent = originalText;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
